<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Metallic Gold Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3A8" />
      <stop offset="25%" stop-color="#D9B23B" />
      <stop offset="50%" stop-color="#FFFCE0" />
      <stop offset="75%" stop-color="#B88E14" />
      <stop offset="100%" stop-color="#8c6800" />
    </linearGradient>
    
    <!-- Deep Cosmic Dark Blue Radial Gradient -->
    <radialGradient id="skyGradient" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#0e172e" />
      <stop offset="70%" stop-color="#060b16" />
      <stop offset="100%" stop-color="#03050a" />
    </radialGradient>
    
    <!-- Drop Shadow for Premium 3D Depth -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.8"/>
      <feGaussianBlur stdDeviation="1" result="blur"/>
    </filter>
  </defs>

  <!-- Background Circle (Deep Cosmic Space) -->
  <circle cx="256" cy="256" r="240" fill="url(#skyGradient)" stroke="url(#goldGradient)" stroke-width="6" />

  <!-- Outer Starry/Astrological Ring -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" stroke-dasharray="2 6" opacity="0.6" />

  <g filter="url(#goldGlow)">
    <!-- 1. CELESTIAL NORTH STAR (Top, centered) -->
    <g transform="translate(256, 100)">
      <!-- Primary vertical & horizontal diamond rays -->
      <path d="M0,-45 L4,-8 L41,0 L4,8 L0,45 L-4,8 L-41,0 L-4,-8 Z" fill="url(#goldGradient)" />
      <!-- Secondary diagonal diamond rays -->
      <path d="M0,-24 L3,-5 L22,-22 L5,-3 L24,0 L5,3 L22,22 L3,5 L0,24 L-3,5 L-22,22 L-5,3 L-24,0 L-5,-3 L-22,-22 L-3,-5 Z" fill="url(#goldGradient)" transform="rotate(45)" opacity="0.85" />
      <!-- Radiant Center Core -->
      <circle cx="0" cy="0" r="4.5" fill="#FFFFFF" />
      <circle cx="0" cy="0" r="10" fill="url(#goldGradient)" opacity="0.4" />
    </g>

    <!-- 2. SACRED LOTUS FLOWER (Bottom, centered) -->
    <g transform="translate(256, 395) scale(0.95)">
      <!-- Center Main Petal -->
      <path d="M0,-35 C-12,-15 -8,5 0,15 C8,5 12,-15 0,-35 Z" fill="url(#goldGradient)" />
      <!-- First Layer Inner Petals (Left and Right) -->
      <path d="M0,15 C-18,5 -22,-15 -10,-28 C-5,-15 2,-2 0,15 Z" fill="url(#goldGradient)" opacity="0.95" />
      <path d="M0,15 C18,5 22,-15 10,-28 C5,-15 -2,-2 0,15 Z" fill="url(#goldGradient)" opacity="0.95" />
      <!-- Second Layer Outer Petals (Left and Right) -->
      <path d="M2,15 C30,12 34,-5 18,-18 C12,-5 5,-2 2,15 Z" fill="url(#goldGradient)" opacity="0.85" />
      <path d="M-2,15 C-30,12 -34,-5 -18,-18 C-12,-5 -5,-2 -2,15 Z" fill="url(#goldGradient)" opacity="0.85" />
      <!-- Bottom Base Leaves -->
      <path d="M 0,14 C -18,18 -32,3 -40,11 C -24,20 -10,16 0,14 Z" fill="url(#goldGradient)" />
      <path d="M 0,14 C 18,18 32,3 40,11 C 24,20 10,16 0,14 Z" fill="url(#goldGradient)" />
    </g>

    <!-- 3. GOLDEN FEATHER OF SAGACITY (Left curve, along circle) -->
    <path d="M 125,320 
             C 105,285 98,230 115,175 
             C 117,165 119,168 117,175
             C 107,225 112,275 131,315 Z" 
          fill="url(#goldGradient)" />
    <!-- Feather Veins / Blades -->
    <path d="M 112,192 C 102,185 92,198 100,205 C 105,210 110,210 112,192 Z" fill="url(#goldGradient)" />
    <path d="M 111,210 C 97,208 89,222 98,229 C 104,233 108,230 111,210 Z" fill="url(#goldGradient)" />
    <path d="M 112,228 C 96,228 89,244 98,251 C 105,255 109,250 112,228 Z" fill="url(#goldGradient)" />
    <path d="M 114,248 C 98,252 91,269 101,274 C 108,277 111,270 114,248 Z" fill="url(#goldGradient)" />
    <path d="M 118,268 C 103,275 98,291 108,295 C 114,297 116,290 118,268 Z" fill="url(#goldGradient)" opacity="0.9" />
    <path d="M 124,288 C 110,296 109,313 118,315 C 123,316 125,310 124,288 Z" fill="url(#goldGradient)" opacity="0.8" />

    <!-- 4. SERENE DIVINE PROFILE (Right curve, silhouetted) -->
    <!-- Beautifully shaped feminine side-profile integrated into circle context -->
    <path d="M 370,165 
             C 365,185 365,200 376,215 
             C 382,223 388,224 388,232
             C 388,238 375,242 376,248
             C 377,252 388,255 388,258 
             C 388,264 374,268 378,275
             C 381,280 393,284 391,291
             C 389,297 372,305 383,322
             C 388,330 398,335 391,345
             C 380,360 361,372 344,380
             C 353,375 369,363 378,350
             C 385,340 391,332 388,321
             C 384,308 393,298 394,291
             C 395,283 383,280 382,275
             C 381,270 392,265 391,258
             C 390,250 380,248 380,244
             C 380,238 392,233 392,225
             C 392,217 380,212 374,195
             C 370,183 370,173 370,165 Z" 
          fill="url(#goldGradient)" />

    <!-- 5. ELEGANT INTERWOVEN "AK" MONOGRAM (Centerpiece) -->
    <g transform="translate(256, 256)" id="monogram">
      <!-- Letter "A" path -->
      <path d="M -75,80 
               L -70,80 
               C -60,80 -55,75 -45,45 
               L -15,-45 
               C -10,-60 -15,-70 -30,-70 
               L -35,-70 
               L -35,-80 
               L 15,-80 
               L 15,-70 
               L 10,-70 
               C -5,-70 -3,-60 5,-35 
               L 35,50 
               C 42,70 50,80 62,80 
               L 68,80 
               L 68,90 
               L 20,90 
               L 20,80 
               C 35,80 33,70 25,50 
               L 13,15 
               L -33,15 
               L -44,48 
               C -50,68 -48,80 -30,80 
               L -25,80 
               L -25,90 
               L -75,90 Z 
               M -30,6 L 10,6 L -10,-52 Z" 
            fill="url(#goldGradient)" />

      <!-- Interwoven Letter "K" path -->
      <!-- Positioned beautifully to the right, intertwining with A's right leg. -->
      <path d="M 12,-70
               L 22,-70
               C 36,-70 36,-66 36,-55
               L 36,-10
               L 62,-40
               C 74,-54 70,-70 52,-70
               L 44,-70
               L 44,-80
               L 102,-80
               L 102,-70
               L 94,-70
               C 80,-70 73,-62 61,-44
               L 36, -8
               L 36, 12
               L 68, 52
               C 82,70 94,80 112,80
               L 118,80
               L 118,90
               L 55,90
               L 55,80
               C 68,80 68,74 58,60
               L 36, 26
               L 36, 55
               C 36,66 38,70 55,70
               L 62,70
               L 62,80
               L 12,80
               L 12,70
               L 18,70
               C 30,70 30,66 30,55
               L 30,-55
               C 30,-66 30,-70 18,-70
               Z" 
            fill="url(#goldGradient)" />
            
      <!-- Subtle interlocking curve connection -->
      <path d="M-10,13 C-5,22 8,22 13,13 C15,8 8,4 -2,7" fill="none" stroke="url(#goldGradient)" stroke-width="4" stroke-linecap="round" opacity="0.9" />
    </g>
  </g>
</svg>
